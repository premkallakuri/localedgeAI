set menu_color_highlight=black/light-gray

set default=0
set timeout=0

menuentry "FastOS USB Install" {
    linux /vmlinuz nouveau.modeset=0 console=ttyS0,921600 console=tty0 sbsa_gwdt.action=1 autoinstall pci=pcie_bus_safe initcall_blacklist=tegra234_cbb_init
    initrd /initrd
}

menuentry "FastOS USB Install Skip FW" {
    linux /vmlinuz nouveau.modeset=0 console=ttyS0,921600 console=tty0 sbsa_gwdt.action=1 usb.skipfw autoinstall pci=pcie_bus_safe initcall_blacklist=tegra234_cbb_init
    initrd /initrd
}

menuentry "FastOS USB Shell" {
    linux /vmlinuz nouveau.modeset=0 console=ttyS0,921600 console=tty0 sbsa_gwdt.action=1 usb.shell pci=pcie_bus_safe initcall_blacklist=tegra234_cbb_init
    initrd /initrd
}
